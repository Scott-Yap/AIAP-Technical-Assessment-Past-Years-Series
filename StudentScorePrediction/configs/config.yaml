# YAML is just a config format. In DevOps, it is often used for CI/CD and containers. 
# In ML projects, it can also be used to store experiment settings such as data paths, 
# train-test split settings, model hyperparameters, and output paths. 
# This keeps the Python code reusable and avoids hardcoding values.



data:
  db_path: "data/score.db"
  table_name: "score"
  target_col: "final_test"
  drop_cols:
    - "index"
    - "student_id"

split:
  test_size: 0.2
  random_state: 42

models:
  random_state: 42
  tuning:
    cv: 5
    scoring: "neg_mean_absolute_error"
  param_grids:
    random_forest:
      model__n_estimators: [100, 200]
      model__max_depth: [8, 12, null]
      model__min_samples_leaf: [1, 2, 4]
      model__max_features: ["sqrt", 1.0]
    gradient_boosting:
      model__n_estimators: [100, 200]
      model__learning_rate: [0.05, 0.1]
      model__max_depth: [2, 3]
      model__min_samples_leaf: [1, 3]

output:
  metrics_path: "outputs/metrics.json"
  model_path: "outputs/best_model.joblib"
